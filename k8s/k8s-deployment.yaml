apiVersion: v1
kind: Namespace
metadata:
  name: codex-6-65
  labels:
    name: codex-6-65

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: codex-config
  namespace: codex-6-65
data:
  MAX_TICKS: "5000000"
  SLEEP_S: "0.001"
  LOG_FILE: "/logs/codex665_summary.json"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: codex-logs-pvc
  namespace: codex-6-65
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: standard
  resources:
    requests:
      storage: 500Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: witness-logs-pvc
  namespace: codex-6-65
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: standard
  resources:
    requests:
      storage: 250Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: codex-engine
  namespace: codex-6-65
  labels:
    app: codex-engine
spec:
  replicas: 48
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 10
      maxUnavailable: 5
  selector:
    matchLabels:
      app: codex-engine
  template:
    metadata:
      labels:
        app: codex-engine
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - codex-engine
                topologyKey: kubernetes.io/hostname
      containers:
        - name: codex-engine
          image: codex665:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: codex-config
          env:
            - name: CUSTOM_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: REGION
              value: "multi-region"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              cpu: "500m"
              memory: "256Mi"
            limits:
              cpu: "2000m"
              memory: "1Gi"
          volumeMounts:
            - name: logs
              mountPath: /logs
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "test -f /logs/codex665_summary.json || exit 1"
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "[ $(find /logs -type f -mmin -1 | wc -l) -gt 0 ] && exit 0 || exit 1"
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: logs
          persistentVolumeClaim:
            claimName: codex-logs-pvc
      terminationGracePeriodSeconds: 60
      securityContext:
        fsGroup: 1000

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: codex-engine-hpa
  namespace: codex-6-65
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: codex-engine
  minReplicas: 48
  maxReplicas: 256
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 4
          periodSeconds: 30
      selectPolicy: Max

---
apiVersion: v1
kind: Service
metadata:
  name: codex-engine-headless
  namespace: codex-6-65
spec:
  clusterIP: None
  selector:
    app: codex-engine
  ports:
    - port: 8000
      targetPort: 8000
      name: metrics

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: witness-aggregator
  namespace: codex-6-65
  labels:
    app: witness-aggregator
spec:
  replicas: 3
  selector:
    matchLabels:
      app: witness-aggregator
  template:
    metadata:
      labels:
        app: witness-aggregator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - witness-aggregator
              topologyKey: kubernetes.io/hostname
      containers:
        - name: witness-aggregator
          image: codex665:latest
          imagePullPolicy: Always
          command: ["python", "witness_aggregator.py"]
          env:
            - name: XYO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: witness-secrets
                  key: xyo-api-key
                  optional: true
            - name: REGION
              value: "multi-region"
          resources:
            requests:
              cpu: "1000m"
              memory: "512Mi"
            limits:
              cpu: "4000m"
              memory: "2Gi"
          volumeMounts:
            - name: witness-logs
              mountPath: /logs/witness_aggregation
          ports:
            - containerPort: 9090
              name: metrics
          livenessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 60
          readinessProbe:
            httpGet:
              path: /ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 30
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
      volumes:
        - name: witness-logs
          persistentVolumeClaim:
            claimName: witness-logs-pvc
      securityContext:
        fsGroup: 1000

---
apiVersion: v1
kind: Service
metadata:
  name: witness-aggregator
  namespace: codex-6-65
  labels:
    app: witness-aggregator
spec:
  type: LoadBalancer
  selector:
    app: witness-aggregator
  ports:
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
    - name: api
      port: 8080
      targetPort: 8000
      protocol: TCP

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: codex-engine-pdb
  namespace: codex-6-65
spec:
  minAvailable: 24
  selector:
    matchLabels:
      app: codex-engine

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: witness-aggregator-pdb
  namespace: codex-6-65
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: witness-aggregator
