version: "3.9"

services:
  # ════════════════════════════════════════════════════════════════════════════
  # VALIDATOR ENGINE (365 days)
  # ════════════════════════════════════════════════════════════════════════════
  engine-365-validator:
    build:
      context: .
      dockerfile: Dockerfile.4gr
    container_name: engine-365
    ports:
      - "365:365"
    environment:
      - ENGINE_ID=365
      - ENGINE_PORT=365
      - ENGINE_TYPE=validator
      - LOCK_ID=${LOCK_ID:-unset}
      - LOCK_INCEPTION=${LOCK_INCEPTION:-unset}
      - LOCK_EXPIRY=${LOCK_EXPIRY:-unset}
      - LOCK_ROOT_HASH=${LOCK_ROOT_HASH:-unset}
      - LOCK_PHRASE=${LOCK_PHRASE:-unset}
      - WOBBLE_SUU=${WOBBLE_SUU:-0.05}
      - WOBBLE_AHA=${WOBBLE_AHA:-0.075}
      - WOBBLE_RERE=${WOBBLE_RERE:-0.15}
      - ENFORCE_LOCK=true
    volumes:
      - ./logs/engine-365:/app/logs
      - ./lock-metadata.json:/app/lock-metadata.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:365/4gr/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.3"
          memory: 256M
    labels:
      engine: "validator"
      lock: "90day-sync"
      te-papa-matihiko: "true"

  # ════════════════════════════════════════════════════════════════════════════
  # SOVEREIGN ENGINE (777 ultimate)
  # ════════════════════════════════════════════════════════════════════════════
  engine-777-sovereign:
    build:
      context: .
      dockerfile: Dockerfile.4gr
    container_name: engine-777
    ports:
      - "777:777"
    environment:
      - ENGINE_ID=777
      - ENGINE_PORT=777
      - ENGINE_TYPE=sovereign
      - LOCK_ID=${LOCK_ID:-unset}
      - LOCK_INCEPTION=${LOCK_INCEPTION:-unset}
      - LOCK_EXPIRY=${LOCK_EXPIRY:-unset}
      - LOCK_ROOT_HASH=${LOCK_ROOT_HASH:-unset}
      - LOCK_PHRASE=${LOCK_PHRASE:-unset}
      - WOBBLE_SUU=${WOBBLE_SUU:-0.05}
      - WOBBLE_AHA=${WOBBLE_AHA:-0.075}
      - WOBBLE_RERE=${WOBBLE_RERE:-0.15}
      - ENFORCE_LOCK=true
    volumes:
      - ./logs/engine-777:/app/logs
      - ./lock-metadata.json:/app/lock-metadata.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:777/4gr/health"]
      interval: 30s
