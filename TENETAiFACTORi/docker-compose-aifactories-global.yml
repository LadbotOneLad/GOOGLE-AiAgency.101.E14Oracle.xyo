version: '3.9'

services:
  # Master Engine (Port 6650) — Prime Meridian Anchor
  aifactories-master-0:
    image: python:3.11-slim
    container_name: aifactories-master-0
    environment:
      ENGINE_ID: "0"
      ROLE: "master"
      PORT: "6650"
      GEOHASH: "00"
      LOGS_DIR: "/logs/aifactories"
    ports:
      - "6650:6650"
    volumes:
      - ./aifactories_earth_locked_core.py:/app/aifactories_earth_locked_core.py
      - ./aifactories_13_harmonic.py:/app/aifactories_13_harmonic.py
      - logs:/logs
    working_dir: /app
    command: |
      sh -c "python3 aifactories_earth_locked_core.py"
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    networks:
      - aifactories

  # Validator 1 & 2 — US East & West
