version: '3.9'

services:
  # TENETAIAGENCY SYNCHRONOUS LOCK ENFORCEMENT
  # All 12 engines must lock together or not at all
  
  engine-1:
    image: python:3.11-slim
    container_name: codex-engine-1
    environment:
      ENGINE_ID: "1"
      SHARED_DIR: "/locks"
      GATE_1_INTEGRITY: "1"
      GATE_2_BYZANTINE: "0.75"
      GATE_3_MAJORITY: "0.65"
      GATE_4_COHERENCE: "0.45"
      GATE_5_DRIFT: "0.08"
      GATE_6_POWER: "0.08"
    volumes:
      - locks:/locks
      - ./tenetaiagency_sync_lock.py:/app/lock_manager.py
    working_dir: /app
    command: |
      sh -c "pip install -q python-dateutil && python3 lock_manager.py"
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    healthcheck:
      disable: true

  engine-2:
    image: python:3.11-slim
    container_name: codex-engine-2
    environment:
      ENGINE_ID: "2"
      SHARED_DIR: "/locks"
      GATE_1_INTEGRITY: "1"
      GATE_2_BYZANTINE: "0.72"
      GATE_3_MAJORITY: "0.68"
      GATE_4_COHERENCE: "0.42"
      GATE_5_DRIFT: "0.12"
      GATE_6_POWER: "0.09"
    volumes:
      - locks:/locks
      - ./tenetaiagency_sync_lock.py:/app/lock_manager.py
    working_dir: /app
    command: |
      sh -c "pip install -q python-dateutil && python3 lock_manager.py"
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    healthcheck:
      disable: true

  engine-3:
    image: python:3.11-slim
    container_name: codex-engine-3
    environment:
      ENGINE_ID: "3"
      SHARED_DIR: "/locks"
      GATE_1_INTEGRITY: "1"
      GATE_2_BYZANTINE: "0.70"
      GATE_3_MAJORITY: "0.62"
      GATE_4_COHERENCE: "0.48"
      GATE_5_DRIFT: "0.10"
      GATE_6_POWER: "0.07"
    volumes:
      - locks:/locks
      - ./tenetaiagency_sync_lock.py:/app/lock_manager.py
    working_dir: /app
    command: |
      sh -c "pip install -q python-dateutil && python3 lock_manager.py"
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    healthcheck:
      disable: true

  # ... engines 4-12 follow same pattern ...
  # (condensed for readability; full file has all 12)

  # MONITORING: Real-time lock state visualization
  lock-monitor:
    image: python:3.11-slim
    container_name: lock-monitor
    volumes:
      - locks:/locks
    working_dir: /locks
    command: |
      sh -c "while true; do 
        echo '=== LOCK STATE ==='; 
        ls -la 2>/dev/null | grep -E 'engine|barrier|lock' || echo 'No lock files yet';
        echo '';
        sleep 2;
      done"
    restart: unless-stopped
    healthcheck:
      disable: true

volumes:
  locks:
    driver: local

networks:
  default:
    driver: bridge
