services:
  # 176-day sovereign loop - synchronized with production engines
  # Shares FIXED_EPOCH (1743724800) for phase synchronization
  
  codex-engine-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codex-engine-1
    environment:
      MAX_TICKS: "1518518400"
      SLEEP_S: "0.001"
      LOG_FILE: "/logs/codex-engine-1.json"
      CUSTOM_ID: "codex-engine-1"
      FIXED_EPOCH: "1743724800"
    volumes:
      - logs:/logs
      - state:/state
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

