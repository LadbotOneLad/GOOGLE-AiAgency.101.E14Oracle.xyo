services:
  # Production 14 engines - synchronized with 176-day sovereign loop
  # Shares state volume and FIXED_EPOCH for phase synchronization
  
  codex-engine-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codex-engine-1-prod
    environment:
      MAX_TICKS: "10000"
      SLEEP_S: "0.001"
      LOG_FILE: "/logs/prod/codex-engine-1.json"
      CUSTOM_ID: "codex-engine-1-prod"
      FIXED_EPOCH: "1743724800"
    volumes:
      - logs:/logs
      - state:/state
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

