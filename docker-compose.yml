version: '3.8'
services:
  web:
    build: .
    ports:
      - "8085:8080"
    environment:
      - DATABASE_URL=postgresql://robuser:robpass@db:5432/robdb
    depends_on:
      - db
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=robuser
      - POSTGRES_PASSWORD=robpass
      - POSTGRES_DB=robdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
