version: "3.9"

services:
  engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: engine
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.8"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M

  mcp-audit-suite:
    build:
      context: .
      dockerfile: Dockerfile
    image: mcp-suite-v2:latest
    container_name: mcp-audit
    ports:
      - "8888:8888"
    environment:
      - FLASK_ENV=production
      - LOG_LEVEL=INFO
    volumes:
      - ./logs/mcp:/app/logs
      - ./audit_data:/app/audit_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped
    depends_on:
      - mcp-audit-suite

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    restart: unless-stopped
    depends_on:
      - prometheus

  digital-thymus:
    build:
      context: .
      dockerfile: Dockerfile.thymus
    image: digital-thymus:latest
    container_name: thymus-core
    ports:
      - "999:9999"
    environment:
      - FLASK_ENV=production
      - LOG_LEVEL=INFO
    volumes:
      - ./logs/thymus:/app/logs
      - ./thymus_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9999/thymus/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

volumes:
  prometheus_data:
  grafana_data:
